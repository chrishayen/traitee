services:
  traitee:
    build: .
    ports:
      - "${PORT:-4000}:4000"
    environment:
      - SECRET_KEY_BASE=${SECRET_KEY_BASE:?Set SECRET_KEY_BASE}
      - PHX_HOST=${PHX_HOST:-0.0.0.0}
      - PORT=4000
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - XAI_API_KEY=${XAI_API_KEY:-}
      - DISCORD_BOT_TOKEN=${DISCORD_BOT_TOKEN:-}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - WHATSAPP_TOKEN=${WHATSAPP_TOKEN:-}
    volumes:
      - traitee_data:/home/traitee/.traitee
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp:size=256m
      - /var/tmp:size=128m
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: "2.0"
          pids: 256

volumes:
  traitee_data:
